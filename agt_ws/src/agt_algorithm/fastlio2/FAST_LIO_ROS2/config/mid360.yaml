/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 3
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/livox/lidar"
            imu_topic:  "/livox/imu"
            time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

        preprocess:
            lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 4 for any other pointcloud input
            scan_line:  4
            blind: 0.5
            timestamp_unit: 3
            scan_rate: 10
            yaw_crop_enable: false       # true: keep only points between yaw_crop_min_deg and yaw_crop_max_deg
            yaw_crop_min_deg: -135.0     # minimum kept horizontal angle in degrees, x-forward as 0 deg
            yaw_crop_max_deg: 135.0      # maximum kept horizontal angle in degrees

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
            extrinsic_R: [ 1., 0., 0.,
                            0., 1., 0.,
                            0., 0., 1.]

        publish:
            path_en: true                # true: publish Path
            effect_map_en: false         # true: publish Effects
            map_en: true                 # true: publish Map cloud
            scan_publish_en:  true       # false: close all the point cloud output
            dense_publish_en: false      # false: low down the points number in a global-frame point clouds scan.
            scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

        pcd_save:
            # true: enable PCD map saving
            pcd_save_en: true
            interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                        # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

        pcd_to_nav2_map:
            enable: false                # true: after saving the .pcd map, also generate Nav2 .pgm + .yaml
            output_dir: ""               # empty: save .pgm/.yaml in the same directory as map_file_path
            save_map_name: ""            # empty: reuse the .pcd file stem as the map name
            resolution: 0.10            # map resolution in m/pixel
            min_points_per_cell: 1      # minimum obstacle points required to mark a cell occupied
            h_min: 0.10                 # minimum obstacle height above local ground, in meters
            h_max: 1.50                 # maximum obstacle height above local ground, in meters
            downsample_leaf_size: 0.25  # voxel downsample size before 3D-to-2D conversion
            max_window_size: 32         # PMF ground segmentation max window size
            slope: 1.0                  # PMF ground slope threshold
            initial_distance: 0.3       # PMF initial distance threshold
            max_distance: 2.5           # PMF maximum distance threshold
            mean_k: 20                  # SOR outlier removal neighbor count
            stddev_mul: 1.0             # SOR standard deviation multiplier threshold
            save_all_cloud: false       # true: save debug intermediate clouds
